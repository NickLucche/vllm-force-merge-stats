name: Update force-merge data

on:
  schedule:
    - cron: "17 6 * * *"   # ~daily, 06:17 UTC (off the :00 rush)
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write           # needed to push data.json back

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch latest data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 fetch.py --days 182
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update force-merge data ($(date -u +%F))"
          git push
